body:
  text: 明菩薩沙彌古吳智旭述菩薩比丘溫陵道昉訂夫道窮覺海必稱性以垂慈教被羣機必攝末而歸本是以界內界外混之弗齊行布圓融類之不隔梵網經心地品者其衆生之本源諸佛之慧命乎本源自性清淨故稱為梵慧命遍傳塵剎故稱為網萬法之所集起故稱為心凡聖之所依持故稱為地約身則舍那為本釋迦為迹約土則華藏為本此界為迹本迹雖殊皆不離於梵網約法則九處所說為別四禪今說為總約義則次第行位為別初心木叉為總總別雖殊皆不出於心地故機緣初熟乃接衆以覲本源心地既敷仍秉法而傳異界示成正覺即廣演總中之別還至菩提爰先敷別內之總至哉斯教尤返迷歸悟之要津行菩薩道之根本也拈一品而知一部指歸即一部而通一代儀法觀一佛而遍知十方三世楷模乃紹先哲之芳規補前聖之未備將釋經文先陳五義一釋名二顯體三明宗四辨用五教相釋名為二初釋佛說梵網經名次釋菩薩心地品名初中為三初釋佛說次釋梵網第三釋經初言佛說者乃大聖慈尊四辨宣揚也梵語具云佛陀此翻覺者自覺覺他覺行圓滿故名為佛原始要終具六即義謂一切衆生本具覺性名為理佛聞此理性圓解初開是名字佛念念觀心伏五住惑名觀行佛功深垢落淨於六根名相似佛分破無明分見法性名分證佛無明斷盡理性圓顯名究竟佛佛有三身謂法報化法即本覺性體報乃始覺智圓化則慈悲應現有處云法身名毗盧遮那此翻光明遍照報身名盧舍那此翻淨滿化身名釋迦牟尼此翻能仁寂默然晉譯華嚴皆稱為盧舍那唐譯皆稱毗盧遮那只是梵音楚夏未必專以此分法報又華嚴或名釋迦或名遮那本無異體惟此經舍那自坐華臺釋迦據百億界當知三身非一非異機緣不同見一異耳又三身皆具單復二義法身單者惟指本來清淨理體報身單者惟指無上功德智慧化身單者惟指應現如水中月法身復者一本性清淨法身即衆生本源自性天真佛也二離垢妙極法身即諸佛所證究竟法界理也報身復者一自受用報身即諸佛智斷二德究竟實果二他受用報身即地上菩薩隨其心量所見剎塵相好一一相好皆無分劑者也化身復者一應現身示成八相二變化身無而倐有又化身亦名應身應物示現如月印水故也示八相者復有三種一勝應身謂地上大士所見相好無量及一類大根衆生雖未登地繇善根力亦能見之此亦名為他受用報二帶劣勝應身即通教三乘所見接入別圓故勝猶依事識故劣三劣應身即界內鈍根所見丈六老比丘相惟依事識不達相海無邊之致故名為劣此三應身復須約橫豎以辨其相約橫辨者只一丈六境本定身界內鈍根見其在木樹下坐生草座以老比丘身轉生滅四諦法輪界內利根即見在寶樹下坐天衣座以帶劣勝應身轉無生四諦法輪界外鈍根又即見其在華藏界坐華王座以圓滿報身轉無量四諦法輪乃至界外利根又即見其居寂光土坐虗空座以清淨法身轉無作四諦法輪此則佛身不動機見自殊故名橫辨也約豎辨者如此經中千百億釋迦自坐菩提樹下義當劣應應藏教機千華上佛自居四禪宮中義當帶劣勝應應通教機故起信論云菩薩功德成滿於色究竟處示一切世間最高大身謂以一念相應慧無明頓盡名一切種智自然而有不思議業能現十方利益衆生即其證也盧舍那佛自據蓮華臺藏世界義當他受用報亦名勝應應別教機此則佛身不同處所亦異若藏教機轉而為通則離於樹下得見四禪中佛若通教機接入別教則從於四禪還至華藏世界惟圓人根利於一切身若橫若豎了知皆即法身影現故不別明身相處所此名豎辨也問起信為圓頓大乘胡得判作通教佛相答文中既言示世間最高大身知是應化非指法報而通教為大乘初門前通三藏令不滯於化城後通別圓令同歸於寶所故功德成滿菩薩示現此身最切機宜兼與今經宛合以三千大千世界統一色究竟天故亦統一佛身即所謂周匝千華上之千釋迦也於同居土中最為高大故名勝應對方便土中猶屬分段故名帶劣言一念相應慧者明是應通教機言無明頓盡名一切種智者約權則斷盡色心無知習氣亦稱佛眼一切種智約實則是從法報而垂應化言不思議業能現十方者即所謂一華百億國一國一釋迦千百億釋迦是千釋迦化身也無而倏有又有二種一示現佛相二示九界相如妙音觀音等隨類現身來時不知去時不覺佛佛道同總以慈悲感應成茲妙用也如此三身義意無量總非異體法身如珠體圓報身如珠光淨化身如珠影互涉離體無光離光無影繇影知光繇光見體三身理明梵網義顯矣又此三身即是三德法身即法身德除中道外無別體故報身即般若德證理繇實智故化身即解脫德處處應現往故三德祕藏諸佛非增衆生非減三身亦爾但迷時為理即三身乃至成佛時為究竟三身耳說者悅其所懷謂諸佛久修久證一體三身了知一切衆生同具此德大悲熏心每思濟度今機緣初熟乃接歸本源世界親覲本尊秉受心地法門次復示成樹下普為凡夫結重輕戒俾受者頓入佛位成真佛子度生本懷於茲暢悅據文則上卷是舍那所說下卷是釋迦所說然經傳此界必繇釋迦之所覆述題稱佛說當指釋迦亦以三身不異故也問三身既是不異何故釋迦擎接大衆還至蓮華臺藏世界同禮舍那答三身不異亦非定一以不異而異故約豎辨如此經中釋迦億國舍那華臺以不一而一故約橫辨如華嚴中不動寂場遍於塵剎又以一而不一故華嚴明或見釋迦或無量壽或復阿閦或賢首等令人不作定一之見以異而不異故此經云如是千百億盧舍那本身令人不作定異之見佛身一異既不可思議說法傳受亦不可思議謂初一番舍那傳法千釋迦受之次一番千釋迦傳法千百億釋迦受之第三番千百億釋迦傳法一切衆生受之乃至現在衆生展轉傳法後世衆生次第受之以言其異則同者亦異舍那尚非千佛千佛尚非百億況千百億豈即一切衆生是名為迹是隨情說以言其同則異者亦同千百億既即千佛化身千佛又即舍那化身彼一切衆生何獨非舍那同體故曰若人受佛戒即入諸佛位汝是當成佛我是已成佛是名為本是隨智說為本施迹繇迹顯本此擎接大衆還蓮華藏意也舍那為本千釋迦為迹千佛又為本千百億釋迦為迹千百億又為本一切衆生為迹乃至展轉傳法者復為本受法者復為迹本迹重重不可思議而離本無迹迹是本家之迹故云諸佛心內衆生離迹無本本是迹家之本故云衆生心內諸佛法華本迹豎約塵劫此經本迹橫約億界豎則古今不離當念橫則自他不隔毫端為本施迹妙智隨情開迹顯本融情歸智豈不巧哉又此經不惟橫開本迹知自他之不隔亦復豎開本迹顯今古之常然如下卷初云吾今來此世界八千返為此娑婆世界坐金剛華光王座乃至摩醯首羅天王宮為是中一切大衆略開心地法門竟豈非開顯數數示成正覺之事故法華經云我實成佛已來久遠若斯但以方便教化衆生令入佛道作如是說也若謂概論受生行菩薩道則觀此大地無有一微塵許非是菩薩捨身命處又何止八千返耶問開近顯遠惟在法華餘部之所不共今方初示成道胡得便約發本為解若此經既已發本又何須法華更開答法華兩番開顯皆點示界內權機令歸佛道今經與華嚴同部自被界外兩機縱令二乘在座猶然若啞如聾況未與法席那知絶唱故須直至法華方得開會不可謂根已熟者亦至法華方開會也問佛三身中的是何身說法答三身既非一異自不容偏執何身說法但為對治有異故使諸經所說不同或云報化非真佛亦非說法者此則恐人執相迷理故惟示法性本覺以為真佛也或云法佛者自覺聖境無言無說說法現儀皆化佛耳此則恐人以法身墮在情量故惟指化佛示三輪也實則說法度生非法身亦不離法身非報化身亦不離報化身若得四悉檀意謂惟法身說法亦可如云報化非說法者謂惟報化說法亦可如云法身無言無說謂三身合乃說法亦可如云功德和法身處處應現往謂三身各各說法亦可法報佛為地上菩薩說法勝應佛為地前及聲聞緣覺說法劣應佛為一切凡夫說法謂三身總無所說亦可如云四十九年不說一字若不解四悉因緣隨執一句皆名謗佛也次釋梵網為二初約喻次約法初約喻者經云時佛觀諸大梵天王網羅幢因為說無量世界猶如網孔一一世界各各不同別異無量佛教門亦復如是故知以喻為名也能喻惟一謂梵王珠幢所喻有二謂世界及佛教門世界即所被之機教門即能被之法法性平等理非種種繇機異故教門亦殊初明所被之機不言衆生而言世界者舉依報以該正報所謂佛世界乃至地獄世界以此種種世界皆是衆生同別二妄所成同中有別別中有同同別互緣安立剎網淨穢差別非言可窮略而明之有四種土一常寂光土二實報無障礙土三方便有餘土四凡聖同居土以四土攝十界者寂光是佛世界實報是菩薩世界方便是聲聞緣覺世界同居是六凡世界也於此四土又各分淨穢及具橫論豎論二義今先明四土初常寂光土者常即法身寂即解脫光即般若又三德皆常性無遷故三德皆寂離塵勞故三德皆光極明淨故如此三法不縱不橫名祕密藏乃清淨法身所遊居處約智名身約理名土身土一如非二相也此無各各別異之致而實遍周別異界中以別異世界離此別無安立處故實報無障礙土者繇於全性起修稱性所感真實果報色心自在塵剎互含地上大士之所遊居身能現土土亦現身不違法性勝妙莊嚴具如華嚴所明法界安立海也方便有餘土者出三界外三乘聖衆修方便道之所遊居但離分段未免變易但盡見思未除別惑故名有餘謂有九人生於此土藏教二人聲聞緣覺通教三人聲聞緣覺及六地以上菩薩別教三人十住十行及十回向圓教一人即是十信也凡聖同居土者三界九地二十五有本是凡夫有漏善不善不動業之所招感而聖人亦復同居其同居者有二種聖一實二權實者謂此聖人始是凡夫本繇夙業牽生此界生此界後因修道力證三乘果權者謂此聖人或是寂光實報方便土人繇大悲願力哀愍衆生示生此界非是業牽以此二種聖人與凡雜處故名凡聖同居土也問同居土中聖有權實上三土中惟聖無凡亦各有權實否答方便土中二權一實若從同居土中斷見思惑盡分段生乃於方便土中受法性身如前所明九人總名一實若寂光實報佛及菩薩為誘定性二乘及地前菩薩令入正位示居方便是名二權實報土中一權一實若別地圓住分破無明而得生者名之為實若寂光法佛現他受用報身教諸菩薩令盡無明源者名之為權寂光土中惟實無權以是諸佛所遊居故次明四土各分淨穢者同居土中五濁輕者則淨如極樂世界妙喜世界等五濁重者則穢如今娑婆世界等又或純淨無穢或純穢無淨或淨兼穢或穢兼淨或淨轉穢或穢轉淨各各不同別異無量皆繇衆生業感致斯差降具如諸經廣明方便土中析空拙度者穢體空巧度者淨細論則九人所見後後轉勝亦得展轉論於淨穢實報土中次第三觀證入者穢一心三觀證入者淨寂光土中分證名穢究竟名淨問同居繇業所牽可分淨穢上之三土皆是聖居那復有穢答譬如孫陀絶色比於天女不啻瞎猴上味酥酡禪天視之不啻膿血色界妙身四空視之逾於癰毒小乘三昧法眼觀之猶如癡醉以此為例淨穢何窮未登妙覺穢終未盡淨終未極故曰一一世界各各不同別異無量也次明橫論豎論者豎則出於同居乃入方便出於方便乃入實報出於實報乃入寂光斷惑既淺深不同住處亦高下逈別橫則不移當處所見自殊於同居土橫超三土謂見思斷盡即見方便塵沙斷盡分破無明即見實報亦得分見寂光無明斷盡即得了了見於寂光於方便土橫超二土謂實報寂光於實報土橫超一土謂常寂光常寂光土無復可超亦無橫豎又約諸佛菩薩三乘聖人隨於己土橫豎自在謂常寂光土能為衆生現下三土實報土中能為衆生現下二土方便土中能為衆生現同居土又同居土中能為衆生示上三土方便土中能為衆生示上二土實報土中能為衆生示寂光土故曰無量世界猶如網孔互相涉入也次明能被之法法貴當機機既萬殊法亦千變概而為語有四種教良以衆生流轉二死止因迷真迷中二種無明迷真故有分段生死須設界內教以度之迷中故有變易生死須設界外教以度之而真中二迷復各有輕重不同故界內外人又各有利鈍根異迷真重者為界內鈍根非析空觀莫生其解故有藏教法起迷真輕者為界內利根非體空觀不逗其宜故有通教法起迷中重者為界外鈍根非次第三觀莫治其惑故有別教法起迷中輕者為界外利根非一心三觀莫開其悟故有圓教法起就此四教復各四門謂有門空門亦有亦空門非有非空門凡四四一十六門就十六門又各具四種悉檀謂諸衆生聞一一門或得歡喜益是世界悉檀或得生善益是為人悉檀或得滅惡益是對治悉檀或得入理益是第一義悉檀故曰佛教門亦復如是猶如世界各各不同別異無量也又說此四教更有四種化儀不同或頓說或漸說或祕密說或不定說頓說者頓示圓宗或雖兼別總被大機如華嚴及此經等漸說者曲為小機引權入實如阿含為漸初但說藏教方等為漸中並談四教而二乘秪得通益般若為漸末帶通別正談圓教而二乘秪得別益祕密說者為此說頓為彼說漸一座一音各自異解互不相知不定說者頓說中得漸益漸說中得頓益以小助大以大助小如此儀法融攝難思故曰佛教門亦復如是猶如無量世界喻以網孔互相涉入也約四教對四土三佛者寂光法佛說圓教實報報佛說別教方便勝應佛說通教同居劣應佛說藏教又法佛能具說四教報佛能說三教謂藏通別勝應能說二教謂藏與通劣應能說一教謂惟三藏又同居中樹下劣應須具說四教衆生根性雜故色究竟天帶劣勝應惟說三教藏教之機不能見故方便土中勝應身佛止說別圓二教令見中道界內二機皆絶分故實報土中他受用報惟說圓教令諸菩薩永盡無明源故自受用報冥於法性惟受真樂等覺以下所不能見無所說法其諸菩薩所可見者皆即他受用報耳寂光法身惟是諸佛自覺聖智境界無復可說又報智冥法性身離一切相遍一切身非說非不說雙照說與不說謂自受用報冥法身而寂然是不說義種種應身依法報而起用即是說義又不惟法身非說非默雙照說之與默即報化等身亦各具說默二用四辨宣揚名之為說三昧正受名之為默有云說法則利益衆生默然則自受法樂一往語耳自有衆生聞佛說法而得歡喜生善滅惡入理者復有衆生見佛默然而得歡喜生善滅惡入理者是故如來一說一默皆關四悉因緣又說能詮表四教一十六門門門令得四益默亦能顯示四教一十六門門門亦得四益若從說法薦取者一往判是信行若從默然薦取者一往判是法行又自有從說法而起隨法行者自有從默然而起隨信行者事非一概又從默然處薦取者一往判是利根從說法處薦取者一往判是鈍根又自有利根則一聞便悟鈍根乃須入定示相者亦非一概今更約機感總述其意樹下千百億劣應正為應藏教機而博地凡夫有夙具通別圓根者即於此劣應而聞後之三教色究竟天帶劣勝應身正為應通教機而諸天世人有夙具別圓根者即於此帶劣勝應身而聞後之二教方便勝應身正為接通入於別圓故鈍者但聞別教利者兼聞圓法實報土中華臺報身正應別圓二機故華嚴圓而兼別此經別而兼圓蓋諸佛現身說法本為一實而施三權必引三權而歸一實既以說法而引亦以示相而引說法而引復有二義一豎引二橫引豎引者先說阿舍以除凡情次說方等以奪聖解次說般若以會其法後說法華以會其人如前所明於三漸中僅得三益直至法華方得圓益此約最鈍根人必須備歷五味而豎入也橫引者即祕密不定二種化儀隨其根性或於阿含便悟圓常或於方等或於般若便悟圓常不必歷盡諸味隨於何味皆得超入所謂置毒乳中乳即殺人酪及二酥乃至醍醐隨其毒發皆即殺人也示相而引亦有二義一豎引二橫引豎引者樹下機熟得見色究竟身四天機熟接歸華藏世界華藏機熟證入平等法性也橫引者只此丈六劣應生身通教機熟即見其為高大勝應別教機熟即見其為剎塵相海圓教機熟即見其為淨妙法身也此橫豎二引復各二意若彼衆生未曾伏斷見思塵沙無明而得見勝應他報及法身者即是夙因將熟故佛以神力加被令見見已方得惑斷理彰若彼衆生既已伏斷三惑而得見三身者即是現在功熟故佛隨機應之如水清則月自現然佛力亦因自力自力亦緣佛力感應道交機法相稱尤見別異無量而互相涉入也約喻釋竟次約法者梵網即是衆生心性乃諸佛之本源行菩薩道之根本是大衆諸佛子之根本也自性本淨名梵塵介含攝名網繇此心性建立無量世界衆生之法及設無量教門諸佛之法故曰心佛及衆生是三無差別而此心性體絶染淨遍能出生染淨諸法正染淨時仍非染淨染亦法界淨亦法界染淨俱不思議乃名為梵所謂佛界清淨乃至地獄清淨即此心性體非同異遍能示現同異諸相正同異時仍非同異異亦法界同亦法界同異俱不思議乃名為網所謂佛為法界一切法趣佛乃至地獄為法界一切法趣地獄略而言之夫心者不起而已介爾有心三千具足謂一念心中必具十界於一一界必各互含便成百界如此百界各具相性乃至本末究竟等十如共有千如復次實法一千假名一千國土一千則成三千實法者地獄五陰乃至佛界五陰假名者地獄假名乃至佛界假名國土者地獄依報乃至佛界依報隨指一法隨舉一名隨拈一塵無非法界理事頓足無缺無餘如一法一切諸法亦復如是如一名一切諸名亦復如是如一塵一切諸塵亦復如是而但云介爾有心三千具足者以衆生太廣佛法太高故且令觀心庶易悟入只此介爾極微劣心三千性相炳然頓具非前非後不減不增何以故一念體圓名為理具隨起念時即名事造良繇介爾所起之心於十界中必落一界一界既現九界同彰故地獄現時一切法趣地獄十界無非獄界又獄界亦能遍起十界乃至佛界現時一切法咸趣佛界十界無非佛界又佛界亦能遍起十界法性自爾非關強造只因此介爾一念之心必全攬法界以為其體而此法界從來無有分劑不可割裂安得謂此介爾之心止是少許法界理耶又此介爾之心既全具法界之理必全具法界之事以此法界從來攝一切事罄無不盡並無一事如微塵許能出法界外者倘謂介爾心中但具法界全理不具法界全事不幾有理外之事耶所以念體念用同名為心念體則冥乎理具而理具還包事造念用則成乎事造而事造還含理具故此事理兩重三千皆即一念心中圓具如帝網珠光光融攝重重無盡難議難思昏迷倒惑此理常如梵網理也迷此理心紛然五住妄受二死不契妙心是成世界種種差別諸佛愍之隨機設教為圓為別為通為藏教設四門門兼四悉或頓或漸或祕或顯廣化衆生令歸本際梵網教也背塵趨覺秉教修行小大隨其夙根鈍利仍其慣習或轉或接或借或會從無量門通一實境梵網行也繇理起教因教發行藉行契理理非心外教行亦然理即法身教即般若行即解脫迷成三障悟顯三身自悟名佛悟他名說自他不二名為梵網約法釋竟第三釋經者先正釋次示通別三明具義互含先正釋者梵語修多羅此翻契經上契妙理下契羣機故名為契為法為則今古常然故名為經從來譯師皆略去契字直稱為經經乃此方之言訓法訓常法者軌持義軌生物解任持自性常者不變不壞義軌持即契機常即契理字雖從略義亦無減而此經法具有教行理三言教經者大聖垂慈隨類開示所有訓誥法界同遵故名為經言行經者一行五行萬行微塵數行三乘聖衆之所共繇決無異趣故名為經言理經者有佛無佛性相常住魔外不能令其壞大聖不能有所作豎窮橫遍體極真如故名為經又文字即教經契機即成行經契理即是理經又此方以文字為教體故指卷帙為經於卷帙中具足三經能令衆生解其所詮即是教依此生善滅惡即是行依此證入法性即是理當知卷帙只是色法於色塵中既具三經餘塵亦爾如佛在世時以音聲為教體或隨聞歡喜隨聞生善滅惡隨聞入證於一音中三經圓具或從善知識及說法人邊聞言得益亦復如是隨法行人歷法觀察以法塵為教體香積佛國以香飯作佛事是味為教體或有佛國以天衣作佛事是觸為教體以要言之六塵體是法界故一一無非教經亦無非行經亦無非理經但隨根有利鈍致使迷悟不同耳次示通別者梵網是別名別餘經故經是通名同名經故教行理三皆論通別具如台宗廣明有釋經為能詮佛說梵網為所詮者茲所不用以佛等五字皆是能詮字下之義皆是所詮若以能所判釋豈佛說梵網四字便非文字而經之一字便無義耶故惟得論通別也三明具義互含者先明具義謂佛等五字各具教行理三義佛即是教生物解故亦即是行是心作故又即是理究竟性故說即是教四辨宣故亦即是行如說行故又即是理如理說故梵即是教顯淨法故亦即是行具梵行故又即是理清淨性故網即是教示差別故亦即是行遍布列故又即是理相常住故經即是教善詮顯故亦即是行共遵繇故又即是理不可壞故次明互含謂佛等五字各含諸字之義佛即是說令他悟故亦即是梵極清淨故亦即是網三輪普覆法界海故亦即是經為天人師極真常故說即是佛覺悟他故亦即是梵言音淨故亦即是網具足四悉一十六門摝諸衆生出生死故亦即是經堪秉受故梵即是佛清淨覺故亦即是說顯示理故亦即是網互照無窮故亦即是經清淨之性不可壞故網即是佛覆護衆生故亦即是說昭示衆生故亦即是梵莊嚴清淨故亦即是經豎窮橫遍故經即是佛法身舍利故亦即是說永傳慧命故亦即是梵離過絶非故亦即是網義門無量故更約品名互顯者佛即菩薩不捨衆生故菩薩即佛不違法界故佛即是心心外無佛故心即是佛佛性之外無別心故佛即是地荷負衆生故地即是佛平等持載故梵網即菩薩自覺覺他故菩薩即梵網差別莊嚴故梵網即心地繇心所現故心地即梵網王所相應故人即是法實法所成故法即是人假名所顯故乃至人法即喻假施設故喻即人法依理智故經即是品離別無總故品即是經離總無別故一一互含義理無際盡一品文盡一部教盡一代法盡十方三世諸佛所說隨拈一經隨拈一品隨拈一句隨拈一字亦各互含無限無劑故云一即是多多即一文隨於義義隨文又云一中解無量無量中解一一字法門海墨書而不盡若不作此解釋者安窺梵網法喻之旨耶次釋菩薩心地品名者為四初釋菩薩人名次釋心地法名三就人法對釋四釋品字先釋菩薩者梵語具云摩訶菩提質帝薩埵此翻大道心成就衆生或翻覺有情或云大士或云開士以其依四諦境發四弘誓擐大甲胄能為難事上弘佛法下化衆生悲智雙運故獲此名今略去六字但稱菩薩明此行位須約四教一明藏教菩薩創聞生滅四諦及事六度法愍己愍他大悲增上發菩提心誓度一切歷三阿僧祗劫熾然修行六波羅蜜初僧祗中離三惡道及邊地根缺女身亦能常識宿命但心猶未知作佛與不作佛二僧祗中心知作佛口未能言第三僧祗功德漸備了知作佛口亦能言三僧祗滿更住百劫修相好因積百福成一相治大千盲人悉瘥為一福等如經廣明至最後生住兜率天宮待衆生緣熟示現降神母胎乃至出家坐菩提樹降伏魔軍齊此以前總名菩薩發真無漏三十四心頓斷見思習氣乃名為佛此藏教中說菩薩於三阿僧祗劫久受生死求大菩提但自專精修行六度而見思二惑伏而不斷以見思若斷即證聲聞辟支佛地永入涅槃不復能行菩薩道故何以須作此說謂此教門本為界內鈍根而設正化二乘傍化菩薩正化二乘者愍其久在火宅了無出意自非權示生滅四諦法門尚不免被三界火燒何繇得解佛之智慧故須為說斷見思惑出分段苦且入化城以蘇息之既為二乘說此法門何得更說菩薩斷惑利生所以三祗止言伏惑直至樹下方乃頓發無漏三十四心也然使見思果在則二生三生尚難保其不迷不退況歷三祗故知此說權中之權已為通教所破經云安有毒器堪貯醍醐此之謂也二明通教菩薩有九地第十名佛一乾慧地體陰界入如幻如化總破見愛八倒名身念處受心法亦如是住此觀中修正勤如意根力覺道雖未得相似理水而總相智慧深利故稱乾慧第二性地從乾慧增進得成暖法乃至頂法忍法世第一法相似得無漏性水故言性地三八人地人者忍也體見假發真斷惑在無間三昧中八忍具足智少一分名八人地四見地者見第一義無生四諦之理斷見惑八十八使皆盡五薄地者體愛假發真斷欲界思惑前六品盡餘三品在煩惱薄也六離欲地體愛假即真斷欲界思惑盡故名離欲七已辦地體色無色愛即真發無漏斷上八地思惑七十二品俱盡故言已辦此前七地與聲聞人共八辟支佛地既斷正使兼侵習氣此地與緣覺人共九菩薩地從空入假道觀雙流深觀二諦進斷習氣色心無知遊戲神通淨佛國土成就衆生學佛十力四無所畏也第十地名為佛者大功德力以資智慧一念相應慧觀真諦究竟習亦無餘如劫火燒木無復灰炭香象渡河到於邊底也此教亦名三乘共十地以七地之前與三乘共八地之前與支佛共又此教名為通者三人雖各不同通觀無生體法同證無學同出分段同到化城故稱為通又通前藏教通後別圓故稱為通也三明別教菩薩此教專被界外之機機不一故說亦不同華嚴明十住十行十回向為三賢十地為聖此經明三十心十地義意頗同而名字逈異至後釋文中當辨金光明但出十地佛果勝天王明十地涅槃明五行如是增減不同皆不出四悉檀意而瓔珞明五十二位位次最為周足至若唯識明資糧加行二位頗似藏教而通達位後明修習十地乃是別教地名楞嚴於十信前更加乾慧十回向後明四加行并取最初三漸次行以為能歷五十七位是其所歷能所合稱共名六十聖位若單約所歷復除乾慧非真妙覺非路則名五十五位真菩提路若據乾慧名同通教四種加行復濫藏名而義理逈別此意多途未易卒舉今且約瓔珞明其階次一外凡十信位一信二念三精進四慧五定六不退七回向八護法九戒十願此十位伏三界見思煩惱次內凡十住位一發心二治地三修行四生貴五方便具足六正心七不退八童真九法王子十灌頂初住斷見惑七住斷思惑盡證位不退與藏通二佛齊八住以上斷界內塵沙伏界外塵沙此十住名習種性用從假入空觀見真諦理開慧眼成一切智行三百由旬三內凡十行位一歡喜二饒益三無違逆四無屈撓五無癡亂六善現七無著八難得九善法十真實此十行斷界外塵沙名性種性用從空入假觀見俗諦理開法眼成道種智四內凡十回向位一救護衆生離衆生相二不壞三等一切佛四至一切處五無盡功德藏六隨順一切平等善根七等隨順一切衆生八真如相九無縛無著解脫十入法界無量此十回向伏無明習中觀名道種性行四百由旬從八住至此名行不退又此三十位亦名三賢也五明十地聖位一歡喜二離垢三發光四𦦨慧五難勝六現前七遠行八不動九善慧十法雲初地用中道觀破一分無明顯一分三德證念不退開佛眼成一切種智行五百由旬初到寶所百界作佛八相成道利益衆生二地以上地地各斷一品無明證一分中道六明等覺位從法雲地更斷一品無明入一生補處此十一位俱名聖種性齊此名為菩薩更破一品無明入第七妙覺位了了見性證大菩提名之為佛四明圓教菩薩圓教位次名與別同但別教次第漸修圓教一心圓具別教位位各不相收圓教位位互相融攝是為不同今亦用瓔珞五十二位復依法華於十信前更明五品觀位一隨喜品若人夙植深厚或從善知識或從經卷圓聞妙理謂心佛衆生三無差別此心即空即假即中全體法界頓具百界千如種種性相聞已信解慶己慶人欲開此心而修圓行圓行者一行一切行略言為十一者識知一念平等具足不可思議二者愍己昏迷慈及一切三者又知此心常寂常照四者用寂照心破一切法即空即假即中五者善識一心諸心若通若塞六者能於此心具足道品向菩提路七者又解此心正助之法八者善識己心及凡聖心九者安心不動不墮不退不散十者雖識一心無量功德不生染著十心成就其心念念悉與諸波羅蜜相應名隨喜品二讀誦品內則勤修理觀外則讀誦大乘聞有助觀之力如膏助火十心轉明三說法品內解轉勝弘誓熏心導利前人化功歸己隨說法淨則智慧淨十心倍明也四兼行六度品正觀增明傍兼利物能以少施與虗空等使一切法趣檀檀為法界事相雖少運懷甚大戒等亦爾理觀為正事行為傍故言兼行事福資理十心彌盛也五正行六度品圓觀淳熟事理欲融事不妨理理不隔事權實二智究了通達治世語言資生産業皆與實相不相違背十心光猛如火益薪也此五品位用圓三觀圓伏五住煩惱名為外凡次入內凡十信繇修圓行善巧增益五倍深明得入圓位善修平等法界即入信心善修慈愍即入念心善修寂照入精進心善修破法即入慧心善修通塞即入定心善修道品入不退心善修正助入回向心善修凡聖位次即入護心善修安忍即入戒心善修離著即入願心此是六根清淨位初心任運先斷見惑證位不退七心任運思惑斷盡八心九心十心任運斷盡界內界外塵沙證行不退與別教十回向齊次明聖位初住以圓觀力分破一品無明三心圓發謂緣因善心發即解脫德了因慧心發即般若德正因理心發即法身德如此三德不縱不橫圓在一心發得本有故名初發心住從二住去乃至等覺凡四十位位位各破一品無明各顯一分三德乃至妙覺永別無明父母究竟登中道山頂成大菩提證大涅槃一切大理大誓願大莊嚴大智斷大遍知大道大用大權實大利益大無住即是十觀成乘圓極竟在於佛盧舍那名淨滿一切皆滿也然圓教行人亦名菩薩亦名為佛以創聞圓理能生圓解是名字即佛外凡五品是觀行即佛內凡十信是相似即佛住行向地乃至等覺皆名分證即佛妙覺極果究竟即佛而等覺以下五品以上已背塵緣未極覺海亦名菩薩又佛既有六即菩薩亦然乃至十界皆明六即妙覺即是究竟菩薩亦是究竟緣覺聲聞究竟天人修羅究竟地獄鬼畜生也次釋心地法名者據天台師但疏下卷戒品則云亦是譬名以品內所明大士要用如人身之有心能總萬事能生勝果為大士所依義之如地今據上品具明菩薩三十心十地法門當是指法之稱然三十心無非菩薩之所遊履一一皆能生勝妙果何獨非地而體性十地一一皆能總攝諸法一一何非菩薩妙心但以相似位中未證真實故地亦名心分證位中堪任荷持故心亦名地則知心地二字似別還通約法約喻皆無不可且下卷重輕戒品若云初發心中常所誦一戒似向發心一位別別拈此塵許法門若云乃至十發趣十長養十金剛十地諸菩薩亦誦我今亦如是誦是誠一切菩薩之要用一切大士之所依喻以心地愈覺融通矣三就人法對釋者問菩薩階位既有四教不同今此心地的屬何教答正屬別圓二教非屬藏通藏通菩薩法門雖亦從此心地流出而機不相關設別圓有接通之義既已被接不復名通今就上下二卷須作兩番對釋次更合釋會經先就上卷三十心十地對釋者若心心別歷地地漸證即是別教菩薩若一心一切心一切心一心一地一切地一切地一地即是圓教菩薩又一往對位解釋則發趣十心同於十住長養十心同於十行金剛十心同於十向體性十地同於歡喜乃至法雲若再往研義則住行向位念念皆應修習此三十心歡喜等地位位皆應遊履此體性地良繇菩薩行位功德難思若欲具說衆必驚疑次第略明人復遍執故此經與華嚴部味雖同特示出入如華嚴十地明十波羅蜜此則以十度為發趣十心華嚴所明菩薩四攝此經收在十長養中此經所明十金剛心大似圓教內凡十信又第六不退心中即具明三種不退華嚴以十度分屬十地此則初地便具十力十號及不共法而五地復專明十力七地專明十八不共十地專明十號功德是以迷宗者便謂相違得旨者知其互映雖次第漸陳而一地中非不具足一切諸地功德雖位位圓攝而分證法身亦自宛然成其高下若不位位具德則圓頓之義不成若不宛然高下則四十二位徒設如月雖漸圓月體非漸月雖不異光必漸增可以悟性修交成義矣次就下卷十重四十八輕戒對釋者藏教在家菩薩但秉優婆塞戒或兼秉善生經中六重二十八輕出家菩薩但秉沙彌比丘二種律儀若急於自度唯持遮戒即名二乘若為衆生故善識開遮即名菩薩不別秉此重輕戒也通教菩薩與藏教同別圓二教菩薩正秉此戒名子位中從師受得或千里無師像前求受若善修五悔者不惟發得攝律儀戒亦能發得定共道共乃至證入五品十心及登正位受此戒已極至佛身於其中間戒體常在設隔世不憶數數重受亦非新得惟退失大心及毀犯十重便失戒體失此戒者如人壞心如地崩陷不復堪能修習善法增長菩提故知此戒即心地也此心地戒從名字菩薩直至等覺位位修習堅固成就入妙覺位戒體圓極諸惡永淨萬善悉滿是故名為盧舍那佛若藏教菩薩轉入別圓者未得定道須從師受已得定道隨發律儀通教初心亦復如是若通教被別圓接者既入真似二位隨應發得勝妙律儀不須受得或為物作則示現秉受亦彌善也問下卷經云一切有心者皆應攝佛戒又云國王王子乃至畜生變化人等但解法師語盡受得戒今明藏通菩薩不秉此戒義云何通答此經不又云衆生受佛戒即入諸佛位乎國王乃至畜生但秉此戒即屬別圓不得名藏通也且據即入佛位位同大覺之言則別教初心尚非其分何呪藏通次更合釋會經者夫以本源心地出生一切菩薩行位各各不同於此菩薩位中位位修行心地法門亦復無量非依心地之法執成菩薩之名非因菩薩之人孰秉心地之法人即是法法即是人繇人故有大菩提繇法故有大涅槃菩提是智涅槃是理無理外之智能照於理無智外之理為智所照理智雙絶理智圓彰智無量故理亦無量理難思故智亦難思交融互攝橫遍豎窮信如帝網明珠光光相映一珠中現一切珠一切珠中一珠影一切珠中一切珠一珠各住一珠位題稱梵網妙極於斯又本源心地不惟出生一切菩薩行位亦復遍出一切諸法所謂地獄心乃至佛心地獄地乃至佛地而茲但云菩薩心地者以菩薩上同慈力下同悲仰遍攝十界之義尤為明顯且菩薩既論六即六即便包十界十界無非心地法門又菩薩位中不惟修此三十心十地亦復遍修一切心地所謂修於地獄心地獄地知即法界乃至修於佛心佛地知即法界而茲但云菩薩者以界界既各明六即則一名即一切名一義即一切義也如此義理無量無邊自非梵網孰為其喻故名梵網經菩薩心地也四釋品字者梵語跋渠此翻為品品者類也義類相從故名為品此經有一百一十二卷六十二品今惟第十菩薩心地品上下兩卷什師誦出然上卷明三十心十地為入佛果之根源下卷明十重四十八輕戒又為行菩薩道之根本性修因果義理皆周飲一滴而知大海燒一丸而具衆香惟貴精修不俟多也二顯體者略為三義初明須顯體二正出體三會異初明須顯體者體是主質乃名下之所詮種種名言意欲令人尋名得體如因筌得魚因指得月若逐名迷體如捉蛇尾反遭其螫世尊所以常為比丘說筏喻也即如此經從梵網題名心地品名乃至上下二卷全文一一無非能詮之名就茲名下一一皆顯所詮之體得此體已方能全性起修以修合性又釋名總詮三法體章別在法身宗章別在般若用章別在解脫教相分別總別故釋名之後須先顯體體雖法身必具二德雖具二德還屬法身具二德故非縱屬法身故非橫不縱不橫故成妙體妙體貴極諸法中尊一切萬行之所歸趣無量功德之所莊嚴種種言辨之所詮顯如衆星拱宸衆流歸海故以禮釋體明是貴極之法法身德也悟此體者窮法界源到實相底故以底釋體明是透徹之宗般若德也得此體者會萬殊而不二遍衆法而無遺故以達釋體明是無礙之用解脫德也如此三義為一妙體迷之則歷劫長淪悟之則當下具足經云大衆心諦信汝是常成佛我是已成佛又盧舍那佛先現虗空光體性本源成佛常住法身三昧示諸大衆後開心地法品意在於斯二正出體者此經以諸佛本源心地為體言心地則當體即是更無他求言本源則法爾性德非關修證言諸佛則出障圓明非同在纏以盧舍那佛及一切世尊所證最極清淨常住法身全是衆生心性之理更無少許別法可得此理即名為體亦為一切教體亦為一切行體此即真正魔外所不能壞權小所不能濫也三會異又二先會諸經次會義疏無作戒體先會諸經者此經與華嚴同一部味當以法界為體法界與諸佛本源心地同體異名更無別體又諸大乘經皆以實相印為經正體實相亦即諸佛本源心地異名以其離一切相即一切法超諸戲論不可破壞無相不相故名實相以其萬法之所從出萬法之所歸趣故各法界以其在凡不滅在聖不增迷悟宛然體性常住故名諸佛本源心地乃至或名法住或名法位或名一切種智或名一實境界或名中道第一義諦等無量異名無量異義究竟總無別體也次會義疏無作戒體者問此品既以諸佛本源心地為體何故智者大師義疏三重玄義之中第二出體乃明無作戒體答大師但疏重輕戒相以便行持故僅列三重玄義謂第一釋名第二出體第三料簡蓋戒法惟貴專修故理體姑置不辨若辨理體則自性清淨無犯無持亦無得失於弘揚戒法似非所急故獨明無作戒體用彰修證之門能如實修自能合性又大部教觀既已廣開稱性圓解今正示秉戒成修何須復談理體所以於三重中雖名出體乃是戒之常體非是所依理體以理體屬性戒體屬修理體於五重中屬體戒體於五重中屬宗言無作者只是一作之後不俟再作所謂憑師秉受直至未來任運止惡任運行善故名無作與無作四諦之義不同以此無作戒體乃是無漏色法受之則得不受則無持之則堅毀之則失故屬事不屬理屬修不屬性屬宗不屬體然事理非二性修交成宗體不隔故起信論云以知法性無染離五欲過故隨順修行尸波羅蜜此經云光非青黃赤白黑非色非心非有非無非因果法而戒光從口出又云計我著相者不能生是法滅壽取證者亦非下種處菩薩戒羯磨文云先發菩提願乃堪受此戒是則無作戒體全依理體而發而本淨理體全賴戒法而顯故義疏中出體一章始則重在以修合性指宗為體次明止行二善又屬力用中事而料簡一章宛同教相雖曰三重五義自足略五成三急在修證四依利物豈不巧哉茲復曲為末世鈍根寡於聞見既不能向大部教觀開圓解門又不能知三十心十地是何法義徒受菩薩戒之虗名何關修證故略述教觀大綱以成合注俾稍知性修不二之旨既通釋一品經文須用五重玄義無作自歸於宗心地乃成正體古今異轍意在於斯三明宗者體顯於性宗顯於修全性起修故不二而二全修在性故二而不二如梁柱是屋之綱維屋空是梁柱所取今以屋空喻體梁柱喻宗繇有梁柱方得受用屋空故次體之後須明宗也此經以佛性因果為宗佛性非因非果遍能出生一切因果經云一切衆生皆有佛性此佛性者即是諸佛本源心地以此不生不滅為本修因然後圓成果地修證則因亦佛性果亦佛性據經文中有三重因果一者三十心十地為因成等正覺為果二者初發心常所誦戒為因分滿法身為果三者諦信成佛為因波羅提木義為果又三十心十地亦得傳傳論於因果正覺惟果諦信惟因本源自性清淨為因因常住法身為果果如此重重因果會入非因非果是此經宗致文云應當靜觀察諸法真實相不生亦不滅不常復不斷不一亦不異不來亦不去如是一心中方便勤莊嚴夫不生不滅等即真常佛性非因果法亦名諸法實相亦名一心正顯經體而方便莊嚴即是稱性圓修成妙因果明此經宗也方便莊嚴復有二義一者智慧莊嚴二者功德莊嚴上卷三十心十地深明觀慧屬於慧行下卷十重四十八輕備顯止行二善屬於行行此亦一往為語若備論者心地法門具勝功德無作妙戒全繇慧明故曰繇慧淨故戒淨繇戒淨故慧淨如兩手互洗不容前後而此無作妙戒及發趣長養金剛等心體性平等諸地同以本源清淨佛性為所依體以宗契體體非宗外悟體成宗宗原屬體修證要門孰過於此四辨用者用是力用亦名功德此經以捨凡入聖為用上卷云我已百阿僧祇劫修行心地以之為因初捨凡夫成等正覺下卷云若人受佛戒即入諸佛位又云但解法師語盡受得戒皆名第一清淨者今總釋其意須知傳傳捨凡傳傳入聖則傳傳清淨若云初捨凡夫成等正覺則惟佛名聖惟佛第一清淨若云受佛戒即入佛位則但能解語便已入聖便成清淨故佛頂從三漸次直至妙覺通名六十聖位若約教道而論則別教三十心名賢十地名聖圓教十信為賢初住以去名聖賢是相似清淨聖是分證清淨今更約六即義釋謂本源自性清淨是理即佛亦理即聖理即清淨此全是凡因此經力用而捨若解語受戒即入佛位是名字佛亦名字聖名字清淨因此經力用最初而入若常作諦信靜觀實相是觀行佛亦觀行聖觀行清淨若三十心向果是相似佛亦相似聖相似清淨若登體性十地是分證佛亦分證聖分證清淨若法身智身滿足是究竟佛亦究竟聖究竟清淨因此經力用次第而入從前望後一一為聖從後望前一一為凡理即惟凡正覺惟聖捨凡須盡入聖須極又理即聖亦理即凡究竟聖亦究竟凡中間四即亦復如是凡無可捨聖無可入無捨無入而論捨入是名無作大功德力也五教相者此經於五時中是第一時日照高山於五味中即是乳味於化儀中即屬頓教於化法中即是別圓然與華嚴同而不同略有三義一者華嚴遮那即是釋迦遍坐塵剎此經舍那自坐華臺釋迦自據千葉二者華嚴諸會說法不動而周此經復從座起乃至餘處三者華嚴十住多明圓義而兼於別十地多明別義而兼於圓此經三十心多明別義亦復兼圓十地多明圓義亦仍兼別一往為論似較華嚴為劣細尋厥旨各有所繇良以如來平等大慈方便應現巧具四悉勝劣隨機或勝法中得劣益或劣法中得勝益事非一致那容定判且如遮那即是釋迦則三身一體之義固為易彰而釋迦接見舍那儼然有開迹顯本之致利根者亦堪取悟又三十心名逈與住行向異或一心別對一位或位位圓修此心兩經參合逾彰法門之妙今但粗定其相則華嚴圓兼別此經別兼圓又釋迦但云千百億者周匝千華乃就二地菩薩所見戒波羅蜜增上故也只此二地所見法門亦復全具一切事理因果無量中一一中無量題稱梵網良有以也又周匝千華何必不表一念千法既念念具足千法亦法法互具無盡聊示千百億界以表心地法門耳五重義竟
